[database]
mode = "local"
local_url = "postgres://postgres:postgres@localhost:5432/wechatbot"
container_url = "postgres://postgres:postgres@postgres:5432/wechatbot"
remote_url = ""

[redis]
mode = "local"
local_url = "redis://127.0.0.1:6379"
container_url = "redis://redis:6379"
remote_url = ""

[media]
backend = "localfs"
local_root = "./data/media"
bucket = "wechatbot-media"
endpoint = "http://127.0.0.1:9000"
access_key = "minioadmin"
secret_key = "minioadmin"

[forwarder]
endpoint = "http://127.0.0.1:8081/webhook/wechat"
hmac_secret = "replace-with-strong-secret"
max_retries = 5
timeout_ms = 3000

[admin]
bind = "127.0.0.1:8787"

[runtime]
qr_expire_secs = 3600
session_online_timeout_secs = 3600
typing_keepalive_secs = 3600
context_expire_secs = 3600
typing_trigger_ms = 1000
