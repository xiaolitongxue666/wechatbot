<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 聊天助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">AI 聊天助手</h1>
        <button class="btn-new-chat" id="btnNewChat" title="新建对话">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="10" y1="3" x2="10" y2="17"/><line x1="3" y1="10" x2="17" y2="10"/>
          </svg>
          新对话
        </button>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="7" cy="7" r="4.5"/><line x1="11" y1="11" x2="14" y2="14"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索对话...">
      </div>
      <nav class="conv-list" id="convList"></nav>
      <div class="sidebar-footer">
        <button class="btn-clear-all" id="btnClearAll">清空所有对话</button>
      </div>
    </aside>

    <!-- 遮罩层（移动端） -->
    <div class="overlay" id="overlay"></div>

    <!-- 主聊天区域 -->
    <main class="chat-main" id="chatMain">
      <!-- 顶部栏 -->
      <header class="chat-header">
        <button class="btn-toggle-sidebar" id="btnToggleSidebar" title="切换侧边栏">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="5" x2="19" y2="5"/><line x1="3" y1="11" x2="19" y2="11"/><line x1="3" y1="17" x2="19" y2="17"/>
          </svg>
        </button>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatHeaderName">AI 助手</div>
          <div class="chat-header-status" id="chatHeaderStatus">在线</div>
        </div>
        <button class="btn-delete-conv" id="btnDeleteConv" title="删除对话">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="3,6 4,6 14,6"/><path d="M5,6V4a1,1,0,0,1,1-1h6a1,1,0,0,1,1,1V6"/><path d="M7,9v5"/><path d="M11,9v5"/><line x1="4" y1="6" x2="14" y2="6"/>
          </svg>
        </button>
      </header>

      <!-- 欢迎页（无对话时） -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="32" cy="32" r="28"/>
            <path d="M22,24a3,3,0,1,0,6,0a3,3,0,0,0-6,0M36,24a3,3,0,1,0,6,0a3,3,0,0,0-6,0"/>
            <path d="M22,40c3,6,17,6,20,0"/>
          </svg>
        </div>
        <h2>你好，我是 AI 助手</h2>
        <p>有什么可以帮助你的？</p>
        <div class="quick-prompts">
          <button class="quick-prompt" data-prompt="用简单的语言解释什么是人工智能">🤖 什么是人工智能？</button>
          <button class="quick-prompt" data-prompt="写一首关于春天的五言绝句">🌸 写一首春天的诗</button>
          <button class="quick-prompt" data-prompt="给我推荐几本好书，并说明推荐理由">📚 推荐几本好书</button>
          <button class="quick-prompt" data-prompt="告诉我一些提高工作效率的方法">⚡ 如何提高工作效率？</button>
        </div>
      </div>

      <!-- 消息列表 -->
      <div class="messages" id="messages"></div>

      <!-- 输入区域 -->
      <div class="input-area">
        <div class="input-box">
          <textarea
            class="msg-input"
            id="msgInput"
            placeholder="输入消息...（Enter 发送，Shift+Enter 换行）"
            rows="1"
          ></textarea>
          <button class="btn-send" id="btnSend" title="发送消息">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path d="M1.5,2l17,8l-17,8l3-8l-3-8z M5,10l12,0"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">AI 助手可能产生不准确的信息，请注意甄别。</div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
